<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Productos - SyA</title>
    <link rel="icon" type="image/jpeg" href="img/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="catalog-container">
        <div class="decoraciones" aria-hidden="true">
            <!-- Cupcake -->
            <svg class="deco deco-1" width="60" height="60" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 38h32l-4 18H20L16 38z"/>
                <path d="M14 38c0-12 6-18 18-18s18 6 18 18"/>
                <circle cx="32" cy="16" r="4"/>
            </svg>
            <!-- Pastel -->
            <svg class="deco deco-2" width="70" height="70" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 40h40v14H12z"/>
                <path d="M12 40c0-8 8-14 20-14s20 6 20 14"/>
                <path d="M18 40v-6c0-2 2-4 4-4"/>
                <path d="M30 40v-10c0-2 2-4 4-4"/>
                <path d="M42 40v-6c0-2-2-4-4-4"/>
            </svg>
            <!-- Galleta -->
            <svg class="deco deco-3" width="50" height="50" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="32" cy="32" r="20"/>
                <circle cx="26" cy="26" r="3"/>
                <circle cx="38" cy="30" r="2.5"/>
                <circle cx="30" cy="38" r="2"/>
            </svg>
            <!-- Batidor -->
            <svg class="deco deco-4" width="55" height="55" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="32" y1="8" x2="32" y2="30"/>
                <path d="M22 30c0 10 4 20 10 24"/>
                <path d="M42 30c0 10-4 20-10 24"/>
                <path d="M27 30c0 10 2 20 5 24"/>
                <path d="M37 30c0 10-2 20-5 24"/>
            </svg>
            <!-- Corazón -->
            <svg class="deco deco-5" width="40" height="40" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 56S8 40 8 24c0-8 6-14 12-14 4 0 8 2 12 8 4-6 8-8 12-8 6 0 12 6 12 14 0 16-24 32-24 32z"/>
            </svg>
            <!-- Estrella -->
            <svg class="deco deco-6" width="45" height="45" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="32,6 38,24 56,24 42,36 46,54 32,44 18,54 22,36 8,24 26,24"/>
            </svg>
            <!-- Espátula -->
            <svg class="deco deco-7" width="50" height="50" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="26" y="6" width="12" height="28" rx="6"/>
                <line x1="32" y1="34" x2="32" y2="58"/>
            </svg>
            <!-- Cupcake 2 -->
            <svg class="deco deco-8" width="55" height="55" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 40h28l-3 16H21L18 40z"/>
                <path d="M18 40c2-10 8-16 14-16s12 6 14 16"/>
                <path d="M32 24c0-6-3-8-3-12"/>
                <circle cx="28" cy="10" r="3"/>
            </svg>
            <!-- Bol -->
            <svg class="deco deco-9" width="60" height="60" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 28h44c0 16-10 28-22 28S10 44 10 28z"/>
                <path d="M20 28c0-8 5-14 12-14s12 6 12 14"/>
            </svg>
            <!-- Rebanada de torta -->
            <svg class="deco deco-10" width="50" height="50" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 48L32 16l24 32H8z"/>
                <path d="M16 48l16-28 16 28"/>
                <line x1="32" y1="36" x2="32" y2="48"/>
            </svg>
            <!-- Cuchara -->
            <svg class="deco deco-11" width="45" height="45" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="32" cy="18" rx="10" ry="12"/>
                <line x1="32" y1="30" x2="32" y2="58"/>
            </svg>
            <!-- Dona -->
            <svg class="deco deco-12" width="55" height="55" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="32" cy="32" r="22"/>
                <circle cx="32" cy="32" r="9"/>
            </svg>
            <!-- Whisk -->
            <svg class="deco deco-13" width="48" height="48" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="32" y1="4" x2="32" y2="24"/>
                <path d="M24 24c0 14 3 26 8 32"/>
                <path d="M40 24c0 14-3 26-8 32"/>
                <path d="M28 24c0 14 1.5 26 4 32"/>
                <path d="M36 24c0 14-1.5 26-4 32"/>
            </svg>
            <!-- Corazón 2 -->
            <svg class="deco deco-14" width="35" height="35" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 56S8 40 8 24c0-8 6-14 12-14 4 0 8 2 12 8 4-6 8-8 12-8 6 0 12 6 12 14 0 16-24 32-24 32z"/>
            </svg>
            <!-- Fondo de cupcake -->
            <svg class="deco deco-15" width="52" height="52" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 36h24l-2 20H22L20 36z"/>
                <path d="M20 36c3-8 7-14 12-14s9 6 12 14"/>
                <circle cx="26" cy="16" r="3"/>
                <circle cx="38" cy="18" r="2"/>
            </svg>
            <!-- Estrella 2 -->
            <svg class="deco deco-16" width="38" height="38" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="32,6 38,24 56,24 42,36 46,54 32,44 18,54 22,36 8,24 26,24"/>
            </svg>
            <!-- Cuchillo -->
            <svg class="deco deco-17" width="42" height="42" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 6L32 36"/>
                <path d="M32 6C38 6 44 14 44 22C44 30 38 36 32 36"/>
                <rect x="28" y="36" width="8" height="22" rx="2"/>
            </svg>
            <!-- Cupcake 3 -->
            <svg class="deco deco-18" width="48" height="48" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 42h28l-3 14H21L18 42z"/>
                <path d="M18 42c2-8 7-14 14-14s12 6 14 14"/>
                <circle cx="32" cy="22" r="5"/>
            </svg>
            <!-- Galleta 2 -->
            <svg class="deco deco-19" width="42" height="42" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="32" cy="32" r="18"/>
                <circle cx="24" cy="28" r="2.5"/>
                <circle cx="36" cy="26" r="2"/>
                <circle cx="30" cy="36" r="2.5"/>
                <circle cx="40" cy="34" r="1.5"/>
            </svg>
            <!-- Estrella 3 -->
            <svg class="deco deco-20" width="32" height="32" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="32,6 38,24 56,24 42,36 46,54 32,44 18,54 22,36 8,24 26,24"/>
            </svg>
        </div>

        <h1 class="main-title">Nuestros Productos</h1>
        
        <div id="contenedor-productos" class="productos-grid">
            </div>
    </main>

    <script defer src="js/data-productos.js"></script>
    <script defer src="js/productos.js"></script>
</body>
</html>
