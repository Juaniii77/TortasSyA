<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checkout - SyA</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SyA</div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="carrito.html">Carrito</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <h1>Finalizar pedido</h1>

    <div class="checkout-container">

        <div class="resumen">
            <h2>Resumen del pedido</h2>
            <div id="resumen-lista"></div>
            <h3 id="resumen-total"></h3>
        </div>

        <div class="datos-bancarios">
            <h2>Datos para transferencia</h2>
            <p><strong>Titular:</strong> Analia Yamil Guerrero</p>
            <p><strong>Alias:</strong> Tortas.Sandy.mp</p>
        </div>

        <form id="form-checkout">
            <h2>Tus datos</h2>

            <label for="nombre">Nombre y apellido</label>
            <input type="text" id="nombre" required>

            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" required>

            <label for="entrega">Modalidad</label>
            <select id="entrega">
                <option value="retiro">Retiro en el local</option>
                <option value="envio">Envío a domicilio</option>
            </select>

            <label for="comprobante">Comprobante de transferencia</label>
            <input type="file" id="comprobante" accept="image/*,.pdf" required>

            <button type="submit">Confirmar pedido</button>
        </form>

    </div>

    <script src="js/checkout.js"></script>
</body>
</html>
